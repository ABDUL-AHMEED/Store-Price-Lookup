        // Function to display items in the table
        function displayItems(items) {
            const tableBody = document.getElementById("tableBody");
            tableBody.innerHTML = ""; // Clear current table content

            if(items.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="3" style="text-align:center; color: #888; padding: 20px;">No items found</td></tr>`;
                return;
            }

            items.forEach(item => {
                let row = `<tr>
                    <td><strong>${item.name}</strong></td>
                    <td>${item.variant}</td>
                    <td class="price">₦${item.price}</td>
                </tr>`;
                tableBody.innerHTML += row;
            });
        }

        // Search logic function
        function searchItems() {
            const query = document.getElementById("searchBar").value.toLowerCase();
            const filteredItems = inventory.filter(item => 
                item.name.toLowerCase().includes(query) || 
                item.variant.toLowerCase().includes(query)
            );
            displayItems(filteredItems);
        }

        // Initialize table setup
        displayItems(inventory);
